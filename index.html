<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
<title>여행 기록 지도</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600&family=Noto+Sans+KR:wght@300;400&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  :root {
    --bg:#f5f5f0; --card-bg:#fff;
    --mg:#5a8a5a; --mgh:#4a7a4a; --mga:#3a6a3a;
    --border:#e0e0d8; --tp:#1a1a1a; --ts:#888880;
    --tr:0.5s cubic-bezier(0.4,0,0.2,1);
    --map-max:520px;
  }

  body {
    font-family:'Noto Sans KR',sans-serif;
    background:var(--bg);
    min-height:100vh;
    overflow-x:hidden;
  }

  /* ── 배경 그라디언트 레이어 ── */
  #bg-layer {
    position:fixed; inset:0; z-index:0;
    background:var(--bg);
  }
  #bg-layer::before {
    content:''; position:absolute; inset:0; opacity:0;
    transition:opacity var(--tr);
    background:var(--region-gradient,transparent);
  }
  #bg-layer.active::before { opacity:1; }

  /* ══════════════════════════════
     모바일 레이아웃 (기본)
  ══════════════════════════════ */
  .layout {
    position:relative; z-index:1;
    display:flex; flex-direction:column;
    align-items:center;
    min-height:100vh;
    padding:28px 16px 80px;
  }

  header {
    text-align:center;
    margin-bottom:20px;
    width:100%;
  }
  header h1 {
    font-family:'Noto Serif KR',serif;
    font-size:clamp(1.3rem,4vw,1.7rem);
    font-weight:300; color:var(--tp);
    letter-spacing:0.15em;
  }
  header p {
    font-size:0.73rem; color:var(--ts);
    margin-top:5px; letter-spacing:0.1em;
  }

  .year-tabs {
    display:flex; gap:7px; flex-wrap:wrap;
    justify-content:center;
    margin-bottom:24px; width:100%;
  }
  .year-tab {
    padding:6px 16px; border-radius:999px;
    border:1.5px solid var(--border);
    background:var(--mg); color:#fff;
    font-family:'Noto Sans KR',sans-serif;
    font-size:0.77rem; cursor:pointer;
    transition:background .22s,border-color .22s,color .22s,transform .15s;
    outline:none; user-select:none;
  }
  .year-tab:hover  { background:#c8d8c0; color:var(--mga); border-color:#b0c8a8; }
  .year-tab.active { background:var(--mga); border-color:var(--mga); color:#fff; }
  .year-tab:active { transform:scale(0.96); }

  /* 지도 컨테이너 */
  #map-wrap {
    width:100%;
    max-width:var(--map-max);
  }
  /* 핀치 줌 / 버튼 줌 래퍼 */
  #map-zoom-wrap {
    width:100%;
    overflow:hidden;
    border-radius:8px;
    position:relative;
    touch-action:none; /* JS 핀치 줌 처리 */
    cursor:grab;
  }
  #map-zoom-wrap:active { cursor:grabbing; }
  #korea-map {
    width:100%; height:auto;
    filter:drop-shadow(0 4px 24px rgba(0,0,0,0.09));
    overflow:visible;
    display:block;
    transform-origin:0 0;
    will-change:transform;
    /* 핀은 SVG viewBox 좌표계에 있으므로 지도 스케일과 함께 자동으로 비례 변환됨 */
  }
  /* 줌 컨트롤 버튼 */
  #zoom-controls {
    display:flex; gap:8px;
    justify-content:flex-end;
    margin-top:10px;
  }
  .zoom-btn {
    width:38px; height:38px; border-radius:50%;
    border:1.5px solid var(--border);
    background:var(--card-bg);
    color:var(--tp); font-size:1.2rem;
    cursor:pointer; display:flex;
    align-items:center; justify-content:center;
    box-shadow:0 2px 8px rgba(0,0,0,0.10);
    transition:background .2s, transform .15s;
    -webkit-tap-highlight-color:transparent;
    user-select:none;
    font-family:sans-serif;
  }
  .zoom-btn:active { transform:scale(0.90); background:#e8e8e0; }

  /* SVG 요소 */
  .region {
    fill:var(--mg); stroke:#fff;
    stroke-width:0.5; stroke-linejoin:round;
    cursor:default; transition:fill .2s;
  }
  .region:hover { fill:var(--mgh); }
  .pin-group {
    cursor:pointer;
    /* 히트박스가 사각형으로 잡히지 않도록 설정 */
    pointer-events: none;
  }
  .pin-group * {
    /* 내부 요소들만 개별적으로 이벤트를 받게 함 (원형 유지) */
    pointer-events: all;
    /* 역스케일링을 위해 transform-origin 설정 */
    transform-origin: center;
    transform-box: fill-box;
  }
  .pin-circle {
    fill:#fff; stroke:var(--mga); stroke-width:0.6;
    transition:fill .2s, opacity .25s;
    /* 개별 transform은 JS에서 제어하므로 CSS transition에서는 transform 제외 */
  }
  /* hover + active(모바일 터치) 시 색상 변경만 CSS로 처리 */
  .pin-group:hover .pin-circle,
  .pin-group:active .pin-circle { fill:var(--mga); }
  .pin-dot { fill:var(--mga); transition:fill .2s,opacity .25s; }
  .pin-group:hover .pin-dot,
  .pin-group:active .pin-dot { fill:#fff; }
  .pin-group.hidden .pin-circle,
  .pin-group.hidden .pin-dot { opacity:0; pointer-events:none; }
  .pin-group.hidden { pointer-events:none; }

  /* ══════════════════════════════
     모바일 카드: 하단 시트
  ══════════════════════════════ */
  #card-overlay {
    position:fixed; inset:0; z-index:100;
    display:flex; align-items:flex-end;
    background:rgba(0,0,0,0);
    pointer-events:none;
    transition:background .3s;
  }
  #card-overlay.visible {
    background:rgba(0,0,0,0.22);
    pointer-events:all;
  }
  .card {
    background:var(--card-bg);
    border-radius:20px 20px 0 0;
    width:100%; max-width:100%;
    max-height:55vh; overflow-y:auto;
    padding:20px 20px 36px;
    box-shadow:0 -8px 40px rgba(0,0,0,0.13);
    transform:translateY(100%);
    opacity:0;
    transition:transform .38s cubic-bezier(0.34,1.22,0.64,1), opacity .3s;
    scrollbar-width:none;
    position:relative;
  }
  .card::-webkit-scrollbar { display:none; }
  #card-overlay.visible .card {
    transform:translateY(0);
    opacity:1;
  }
  /* 드래그 핸들 */
  .card-handle {
    width:36px; height:4px;
    background:#ddd; border-radius:2px;
    margin:0 auto 14px;
  }

  .card-header { margin-bottom:14px; }
  .card-title {
    font-family:'Noto Serif KR',serif;
    font-size:1.05rem; font-weight:600;
    color:var(--tp); line-height:1.3;
  }
  .card-year-badge {
    display:inline-block; margin-top:5px;
    padding:2px 10px; border-radius:999px;
    background:#eef4ea; color:var(--mga);
    font-size:0.67rem; letter-spacing:0.08em;
  }
  .card-address-row {
    display:flex; align-items:center;
    gap:8px; margin-top:6px;
  }
  .card-address {
    font-size:0.74rem; color:var(--ts);
    font-weight:300; flex:1; line-height:1.4;
  }
  .copy-btn {
    background:none; border:1px solid var(--border);
    border-radius:6px; padding:3px 8px;
    font-size:0.64rem; color:var(--ts);
    cursor:pointer; transition:all .2s;
    white-space:nowrap;
    font-family:'Noto Sans KR',sans-serif;
  }
  .copy-btn:hover { background:var(--mg); color:#fff; border-color:var(--mg); }
  .copy-btn.copied { background:var(--mga); color:#fff; border-color:var(--mga); }

  .card-images {
    display:flex; gap:8px;
    overflow-x:auto; scrollbar-width:none;
    padding-bottom:4px; margin-top:12px;
  }
  .card-images::-webkit-scrollbar { display:none; }
  .img-placeholder {
    width:90px; aspect-ratio:1/1.2;
    border-radius:10px; flex-shrink:0;
    background:linear-gradient(135deg,#e8e8e0,#d8d8d0);
    display:flex; align-items:center;
    justify-content:center; font-size:1.5rem;
  }

  .card-close {
    position:absolute; top:14px; right:16px;
    width:32px; height:32px; border-radius:50%;
    background:var(--border); border:none;
    cursor:pointer; display:flex;
    align-items:center; justify-content:center;
    font-size:0.75rem; color:var(--ts);
    transition:all .2s;
  }
  .card-close:hover { background:#ccc; color:var(--tp); }
  .empty-note {
    font-size:0.72rem; color:var(--ts);
    text-align:center; margin-top:16px;
    font-style:italic;
  }

  /* ══════════════════════════════
     PC 레이아웃 (768px+)
  ══════════════════════════════ */
  @media (min-width: 768px) {
    :root { --map-max:460px; }

    .layout {
      flex-direction:row;
      align-items:flex-start;
      justify-content:center;
      gap:40px;
      padding:48px 40px 60px;
      max-width:1100px;
      margin:0 auto;
    }

    /* 왼쪽 패널: 헤더 + 탭 + 카드 */
    .left-panel {
      display:flex; flex-direction:column;
      align-items:flex-start;
      width:320px; flex-shrink:0;
      position:sticky; top:48px;
    }

    header { text-align:left; margin-bottom:18px; }
    .year-tabs { justify-content:flex-start; margin-bottom:28px; }

    /* 지도 오른쪽 */
    #map-wrap {
      flex:1;
      min-width:280px;
      max-width:var(--map-max);
    }
    /* PC에서 줌 컨트롤 숨김 (마우스 휠로 충분) */
    #zoom-controls { display:none; }

    /* PC에서 카드: 왼쪽 패널 아래에 인라인으로 */
    #card-overlay {
      position:static !important;
      background:none !important;
      pointer-events:all !important;
      display:block !important;
      width:100%;
    }
    #card-overlay.visible { background:none !important; }

    .card {
      border-radius:16px;
      max-height:none;
      transform:none !important;
      opacity:1 !important;
      box-shadow:0 4px 24px rgba(0,0,0,0.10);
      padding:20px;
      display:none;   /* JS로 토글 */
      transition:none;
    }
    .card.pc-visible { display:block; }
    .card-handle { display:none; }
    .card-close { top:12px; right:12px; }
  }

  /* 넓은 PC */
  @media (min-width: 1100px) {
    :root { --map-max:540px; }
    .layout { gap:60px; }
    .left-panel { width:360px; }
  }
</style>
</head>
<body>
<div id="bg-layer"></div>

<div class="layout">
  <!-- ── 왼쪽 패널 (PC) / 상단 (모바일) ── -->
  <div class="left-panel">
    <header>
      <h1>여행 기록</h1>
      <p>핀을 눌러 기록을 확인하세요</p>
    </header>

    <div class="year-tabs">
      <button class="year-tab active" data-year="all">전체</button>
      <button class="year-tab" data-year="2026">2026</button>
      <button class="year-tab" data-year="2027">2027</button>
      <button class="year-tab" data-year="2028">2028</button>
    </div>

    <!-- PC 전용 인라인 카드 (모바일에서는 숨김, overlay로 대체) -->
    <div id="card-overlay" onclick="closeCardOutside(event)">
      <div class="card" id="info-card">
        <div class="card-handle"></div>
        <button class="card-close" onclick="closeCard()">✕</button>
        <div class="card-header">
          <div class="card-title" id="card-title">—</div>
          <span class="card-year-badge" id="card-year-badge"></span>
          <div class="card-address-row">
            <div class="card-address" id="card-address">—</div>
            <button class="copy-btn" id="copy-btn" onclick="copyAddress()">복사</button>
          </div>
        </div>
        <div class="card-images" id="card-images"></div>
        <div class="empty-note" id="card-empty" style="display:none">아직 기록이 없어요.</div>
      </div>
    </div>
  </div>

  <!-- ── 지도 ── -->
  <div id="map-wrap">
    <!-- 줌 컨트롤 버튼 (모바일 전용) -->
    <div id="zoom-controls">
      <button class="zoom-btn" id="btn-zoom-out" aria-label="축소">−</button>
      <button class="zoom-btn" id="btn-zoom-reset" aria-label="초기화" style="font-size:0.8rem;">↺</button>
      <button class="zoom-btn" id="btn-zoom-in" aria-label="확대">+</button>
    </div>
    <div id="map-zoom-wrap">
    <!-- [SVG 데이터 위치] 깃허브의 korea_map.svg 내용을 여기에 붙여넣으세요 -->
    </div><!-- /#map-zoom-wrap -->
  </div><!-- /#map-wrap -->
</div><!-- /.layout -->

<script>
  const IS_PC = () => window.innerWidth >= 768;

  const regionBg = {
    gangwon:  'radial-gradient(ellipse at 70% 20%, #c8dfc0 0%, #a0c4a0 40%, #f5f5f0 100%)',
    gyeonggi: 'radial-gradient(ellipse at 30% 30%, #d0d8e8 0%, #b8c8e0 40%, #f5f5f0 100%)',
    chungbuk: 'radial-gradient(ellipse at 50% 50%, #d8e0c8 0%, #b8c8a8 40%, #f5f5f0 100%)',
    chungnam: 'radial-gradient(ellipse at 30% 50%, #d8e4c8 0%, #b8cca8 40%, #f5f5f0 100%)',
    gyeongbuk:'radial-gradient(ellipse at 70% 50%, #e0d8c0 0%, #c8c0a0 40%, #f5f5f0 100%)',
    gyeongnam:'radial-gradient(ellipse at 70% 70%, #c8e0d8 0%, #a8c8c0 40%, #f5f5f0 100%)',
    jeonbuk:  'radial-gradient(ellipse at 30% 60%, #d8e8c8 0%, #b8d0a8 40%, #f5f5f0 100%)',
    jeonnam:  'radial-gradient(ellipse at 30% 70%, #c8e8d8 0%, #a8d0b8 40%, #f5f5f0 100%)',
    busan:    'radial-gradient(ellipse at 75% 70%, #b8d8e8 0%, #90b8d0 40%, #f5f5f0 100%)',
    jeju:     'radial-gradient(ellipse at 40% 90%, #b8e0d8 0%, #88c8c0 40%, #f5f5f0 100%)',
  };

  const pinData = {
    chuncheon:{ title:'춘천 명동닭갈비', address:'강원특별자치도 춘천시 명동길 11', region:'gangwon', year:2026, images:['🍗','☕','🏞️'] },
    seoul:    { title:'광장시장', address:'서울특별시 종로구 창경궁로 88', region:'gyeonggi', year:2026, images:['🥘','🫕','🌆'] },
    busan:    { title:'돼지국밥 거리', address:'부산광역시 동래구 명륜로 97', region:'busan', year:2027, images:['🍲','🌊','🐟'] },
    yeosu:    { title:'여수 밤바다', address:'전라남도 여수시 돌산읍 돌산로', region:'jeonnam', year:2027, images:['🌊','🦞','🌃'] },
    jeju:     { title:'성산일출봉', address:'제주특별자치도 서귀포시 성산읍 일출로 284-12', region:'jeju', year:2028, images:['🌋','🍊','🌅'] },
  };

  let currentAddress = '';

  /* ── 연도 탭 ── */
  document.querySelectorAll('.year-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.year-tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      const year = tab.dataset.year;
      document.querySelectorAll('.pin-group').forEach(pin => {
        pin.classList.toggle('hidden', year !== 'all' && pin.dataset.year !== year);
      });
      closeCard();
    });
  });

  /* ── 카드 열기 ── */
  function openCard(pinId) {
    const data = pinData[pinId]; if (!data) return;

    // 배경 그라디언트
    const bg = document.getElementById('bg-layer');
    bg.style.setProperty('--region-gradient', regionBg[data.region] || '');
    bg.classList.add('active');

    // 카드 내용
    document.getElementById('card-title').textContent = data.title;
    document.getElementById('card-address').textContent = data.address;
    document.getElementById('card-year-badge').textContent = data.year + '년';
    currentAddress = data.address;

    const ic = document.getElementById('card-images'); ic.innerHTML = '';
    const empty = document.getElementById('card-empty');
    if (data.images?.length) {
      empty.style.display = 'none';
      data.images.forEach(img => {
        const d = document.createElement('div'); d.className = 'img-placeholder'; d.textContent = img; ic.appendChild(d);
      });
    } else { empty.style.display = 'block'; }

    document.getElementById('copy-btn').textContent = '복사';
    document.getElementById('copy-btn').classList.remove('copied');

    const overlay = document.getElementById('card-overlay');
    const card    = document.getElementById('info-card');

    if (IS_PC()) {
      // PC: 인라인 표시
      card.classList.add('pc-visible');
    } else {
      // 모바일: 하단 시트
      overlay.classList.add('visible');
    }
  }

  /* ── 카드 닫기 ── */
  function closeCard() {
    document.getElementById('card-overlay').classList.remove('visible');
    document.getElementById('info-card').classList.remove('pc-visible');
    document.getElementById('bg-layer').classList.remove('active');
  }

  function closeCardOutside(e) {
    if (!IS_PC() && e.target === document.getElementById('card-overlay')) closeCard();
  }

  /* ── 주소 복사 ── */
  function copyAddress() {
    navigator.clipboard.writeText(currentAddress).then(() => {
      const btn = document.getElementById('copy-btn');
      btn.textContent = '복사됨'; btn.classList.add('copied');
      setTimeout(() => { btn.textContent = '복사'; btn.classList.remove('copied'); }, 1500);
    });
  }

  /* ── 지역 hover 배경 ── */
  document.querySelectorAll('.region').forEach(el => {
    el.addEventListener('mouseenter', () => {
      const r = el.dataset.region; if (!regionBg[r]) return;
      const bg = document.getElementById('bg-layer');
      if (!bg.classList.contains('active')) {
        bg.style.setProperty('--region-gradient', regionBg[r]);
        bg.classList.add('active');
      }
    });
    el.addEventListener('mouseleave', () => {
      const overlay = document.getElementById('card-overlay');
      const card    = document.getElementById('info-card');
      const cardOpen = overlay.classList.contains('visible') || card.classList.contains('pc-visible');
      if (!cardOpen) document.getElementById('bg-layer').classList.remove('active');
    });
  });

  /* ── 리사이즈 시 카드 상태 보정 ── */
  window.addEventListener('resize', () => {
    const overlay = document.getElementById('card-overlay');
    const card    = document.getElementById('info-card');
    if (IS_PC()) {
      // PC로 전환: 모바일 overlay 끄고 pc-visible만 유지
      if (overlay.classList.contains('visible') && card.classList.contains) {
        overlay.classList.remove('visible');
        card.classList.add('pc-visible');
      }
    } else {
      // 모바일로 전환: pc-visible 끄고 overlay로 전환
      if (card.classList.contains('pc-visible')) {
        card.classList.remove('pc-visible');
        overlay.classList.add('visible');
      }
    }
  });

  /* ══════════════════════════════
     핀치 줌 + 드래그 + 버튼 줌
     핀은 SVG viewBox 좌표계 안에 있으므로
     지도 transform 스케일과 함께 자동 비례 변환됨
  ══════════════════════════════ */
  (function() {
    const wrap = document.getElementById('map-zoom-wrap');
    const svg  = document.getElementById('korea-map');

    let scale = 1, tx = 0, ty = 0;
    const MIN_SCALE = 1, MAX_SCALE = 4;

    function applyTransform() {
      svg.style.transform = `translate(${tx}px, ${ty}px) scale(${scale})`;
      
      // 핀 역스케일링: 지도가 커지는 만큼 핀을 작게 만들어 시각적 크기 유지
      const invScale = 1 / scale;
      document.querySelectorAll('.pin-group').forEach(group => {
        const circle = group.querySelector('.pin-circle');
        const dot    = group.querySelector('.pin-dot');
        const hit    = group.querySelector('circle[fill="transparent"]');
        
        // 기본 역스케일링 배율
        let s = invScale;
        
        // hover/active 시에는 1.4배 강조 효과 적용
        // (단, 지도가 커진 상태이므로 강조 효과도 invScale이 곱해진 상태에서 적용되어야 함)
        const isHover = group.matches(':hover') || group.matches(':active');
        if (isHover) s *= 1.4;

        if (circle) circle.style.transform = `scale(${s})`;
        if (dot)    dot.style.transform    = `scale(${s})`;
        if (hit)    hit.style.transform    = `scale(${s})`;
      });
    }

    // hover 시에도 역스케일링 상태에서 강조되도록 이벤트 리스너 추가
    document.querySelectorAll('.pin-group').forEach(group => {
      ['mouseenter', 'mouseleave', 'touchstart', 'touchend'].forEach(evt => {
        group.addEventListener(evt, () => {
          // 브라우저가 hover 상태를 즉시 반영하지 않을 수 있으므로 약간의 지연 후 실행하거나 직접 호출
          requestAnimationFrame(applyTransform);
        });
      });
    });

    function clampTranslate(s, x, y) {
      const ww = wrap.clientWidth;
      const wh = wrap.clientHeight;
      const sw = svg.clientWidth  * s;
      const sh = svg.clientHeight * s;
      const maxX = 0;
      const minX = Math.min(0, ww - sw);
      const maxY = 0;
      const minY = Math.min(0, wh - sh);
      return {
        x: Math.max(minX, Math.min(maxX, x)),
        y: Math.max(minY, Math.min(maxY, y))
      };
    }

    /* ── 버튼 줌 ── */
    function zoomTo(newScale, cx, cy) {
      cx = cx ?? wrap.clientWidth  / 2;
      cy = cy ?? wrap.clientHeight / 2;
      const ratio = newScale / scale;
      const newTx = cx - ratio * (cx - tx);
      const newTy = cy - ratio * (cy - ty);
      scale = newScale;
      const clamped = clampTranslate(scale, newTx, newTy);
      tx = clamped.x; ty = clamped.y;
      applyTransform();
    }

    document.getElementById('btn-zoom-in').addEventListener('click', () => {
      zoomTo(Math.min(MAX_SCALE, parseFloat((scale * 1.4).toFixed(2))));
    });
    document.getElementById('btn-zoom-out').addEventListener('click', () => {
      zoomTo(Math.max(MIN_SCALE, parseFloat((scale / 1.4).toFixed(2))));
    });
    document.getElementById('btn-zoom-reset').addEventListener('click', () => {
      scale = 1; tx = 0; ty = 0; applyTransform();
    });

    // 초기화 시 핀 크기 설정
    window.addEventListener('load', applyTransform);

    /* ── 핀치 줌 (모바일) ── */
    let lastDist = null;
    let lastMidX = 0, lastMidY = 0;

    wrap.addEventListener('touchstart', e => {
      if (e.touches.length === 2) {
        e.preventDefault();
        const t0 = e.touches[0], t1 = e.touches[1];
        lastDist = Math.hypot(t1.clientX - t0.clientX, t1.clientY - t0.clientY);
        const rect = wrap.getBoundingClientRect();
        lastMidX = (t0.clientX + t1.clientX) / 2 - rect.left;
        lastMidY = (t0.clientY + t1.clientY) / 2 - rect.top;
      }
    }, { passive: false });

    wrap.addEventListener('touchmove', e => {
      if (e.touches.length === 2) {
        e.preventDefault();
        const t0 = e.touches[0], t1 = e.touches[1];
        const dist = Math.hypot(t1.clientX - t0.clientX, t1.clientY - t0.clientY);
        if (lastDist) {
          const ratio = dist / lastDist;
          const newScale = Math.max(MIN_SCALE, Math.min(MAX_SCALE, scale * ratio));
          const rect = wrap.getBoundingClientRect();
          const midX = (t0.clientX + t1.clientX) / 2 - rect.left;
          const midY = (t0.clientY + t1.clientY) / 2 - rect.top;
          const scaleRatio = newScale / scale;
          const newTx = midX - scaleRatio * (midX - tx);
          const newTy = midY - scaleRatio * (midY - ty);
          scale = newScale;
          const clamped = clampTranslate(scale, newTx, newTy);
          tx = clamped.x; ty = clamped.y;
          applyTransform();
          lastDist = dist;
          lastMidX = midX; lastMidY = midY;
        }
      }
    }, { passive: false });

    wrap.addEventListener('touchend', e => {
      if (e.touches.length < 2) lastDist = null;
    });

    /* ── 드래그 패닝 (단일 터치 / 마우스) ── */
    let isDragging = false;
    let dragStartX = 0, dragStartY = 0;
    let dragTxStart = 0, dragTyStart = 0;
    let didDrag = false;

    function pointerDown(clientX, clientY) {
      isDragging = true; didDrag = false;
      dragStartX = clientX; dragStartY = clientY;
      dragTxStart = tx; dragTyStart = ty;
    }
    function pointerMove(clientX, clientY) {
      if (!isDragging || scale <= 1) return;
      const dx = clientX - dragStartX;
      const dy = clientY - dragStartY;
      if (Math.abs(dx) > 3 || Math.abs(dy) > 3) didDrag = true;
      const clamped = clampTranslate(scale, dragTxStart + dx, dragTyStart + dy);
      tx = clamped.x; ty = clamped.y;
      applyTransform();
    }
    function pointerUp() { isDragging = false; }

    // 마우스
    wrap.addEventListener('mousedown', e => pointerDown(e.clientX, e.clientY));
    window.addEventListener('mousemove', e => { if (isDragging) pointerMove(e.clientX, e.clientY); });
    window.addEventListener('mouseup', pointerUp);

    // 단일 터치 드래그 (핀치 줌 중에는 실행 안 함)
    wrap.addEventListener('touchstart', e => {
      if (e.touches.length === 1) {
        pointerDown(e.touches[0].clientX, e.touches[0].clientY);
      }
    }, { passive: true });
    wrap.addEventListener('touchmove', e => {
      if (e.touches.length === 1 && scale > 1) {
        e.preventDefault();
        pointerMove(e.touches[0].clientX, e.touches[0].clientY);
      }
    }, { passive: false });
    wrap.addEventListener('touchend', () => pointerUp());

    /* ── 마우스 휠 줌 (PC) ── */
    wrap.addEventListener('wheel', e => {
      e.preventDefault();
      const rect = wrap.getBoundingClientRect();
      const cx = e.clientX - rect.left;
      const cy = e.clientY - rect.top;
      const delta = e.deltaY > 0 ? 0.85 : 1.18;
      const newScale = Math.max(MIN_SCALE, Math.min(MAX_SCALE, scale * delta));
      zoomTo(newScale, cx, cy);
    }, { passive: false });
  })();
</script>
</body>
</html>
